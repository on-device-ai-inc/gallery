  - role: "assistant"
    content: "I see the issue! You're binding to lifecycle but not unbinding. You need to call `cameraProvider.unbindAll()` before binding again. Also, wrap the binding in a try-catch. Here's the fix:\n\n```kotlin\ntry {\n    cameraProvider.unbindAll()\n    cameraProvider.bindToLifecycle(this, cameraSelector, preview)\n} catch(e: Exception) {\n    Log.e(TAG, \"Camera binding failed\", e)\n}\n```"
