  - role: "assistant"
    content: "Good question! If you're using `bindToLifecycle()`, CameraX handles cleanup automatically when the lifecycle is destroyed. However, you can add `cameraProvider.unbindAll()` in onDestroy() for explicit cleanup."
    is_starred: false
    is_system_generated: false
    is_first_in_conversation: false

