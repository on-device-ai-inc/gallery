# GQA Test Case: Long General Chat Conversation
# Category: Long Conversation
# Purpose: Test compression quality on extended casual conversation

test_case_id: "lc_001"
category: "long_conversation"
description: "50-message general discussion covering daily activities, weather, and plans"
token_budget: 4096
target_compression_ratio: 0.3

