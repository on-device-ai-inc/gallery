evaluation_queries:
  - query: "What app is the user building?"
    expected_keywords: ["hiking", "trails", "mobile app", "Kotlin", "Compose"]
    importance: "high"

  - query: "What mapping library did they decide to use?"
    expected_keywords: ["Mapbox", "offline", "maps"]
    importance: "high"

  - query: "What was suggested about battery optimization?"
    expected_keywords: ["FusedLocationProvider", "5-10 seconds", "battery saver"]
    importance: "medium"

  - query: "What feature idea was discussed for user flexibility?"
    expected_keywords: ["quality tiers", "download sizes", "basic", "standard", "high-detail"]
    importance: "medium"

  - query: "What Android API levels should be tested?"
    expected_keywords: ["API 29", "31", "33", "permissions"]
    importance: "low"

expected_compression_behavior:
  - "Should preserve main topic: hiking trails app development"
  - "Should retain key technical decisions: Mapbox, FusedLocationProvider, quality tiers"
  - "Should maintain important details: battery optimization, permission handling"
  - "Can compress generic greetings and transitions"
  - "Should preserve actionable recommendations"
