syntax = "proto3";

package ai.ondevice.app.proto;

option java_package = "ai.ondevice.app.proto";
option java_multiple_files = true;

enum Theme {
  THEME_UNSPECIFIED = 0;

  // Force to use light theme.
  THEME_LIGHT = 1;

  // Force to use dark theme.
  THEME_DARK = 2;

  // Use the system them setting on user's phone.
  THEME_AUTO = 3;
}

// Epic 5: Text size preference for accessibility
enum TextSize {
  TEXT_SIZE_UNSPECIFIED = 0;
  TEXT_SIZE_SMALL = 1;
  TEXT_SIZE_MEDIUM = 2;  // Default
  TEXT_SIZE_LARGE = 3;
}

// Epic 5: Auto-cleanup configuration for old conversations
enum AutoCleanup {
  AUTO_CLEANUP_UNSPECIFIED = 0;
  AUTO_CLEANUP_NEVER = 1;  // Default - never auto-delete
  AUTO_CLEANUP_30_DAYS = 2;
  AUTO_CLEANUP_90_DAYS = 3;
  AUTO_CLEANUP_1_YEAR = 4;
}

message AccessTokenData {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at_ms = 3;
}

message ImportedModel {
  string file_name = 1;
  int64 file_size = 2;

  oneof config {
    LlmConfig llm_config = 3;
  }
}

message LlmConfig {
  repeated string compatible_accelerators = 1;
  int32 default_max_tokens = 2;
  int32 default_topk = 3;
  float default_topp = 4;
  float default_temperature = 5;
  bool support_image = 6;
  bool support_audio = 7;
}

message Settings {
  Theme theme = 1;
  AccessTokenData access_token_data = 2;  // deprecated
  repeated string text_input_history = 3;
  repeated ImportedModel imported_model = 4;
  bool is_tos_accepted = 5;

  // Epic 5: Settings & Data Management
  TextSize text_size = 6;  // Story 5.4: Text size adjustment
  AutoCleanup auto_cleanup = 7;  // Story 5.3: Auto-cleanup configuration
  int64 storage_budget_bytes = 8;  // Story 5.2: Storage budget (default 4GB = 4294967296)

  // Self-hosted Gemma: Terms acceptance tracking
  int64 gemma_terms_accepted_timestamp = 9;  // 0 = not accepted, >0 = Unix timestamp of acceptance

  // Story 8: Custom Instructions - Persistent instructions prepended to every prompt
  string custom_instructions = 10;

  // User Profile - Personalized greetings
  string user_full_name = 11;  // User's full name (e.g., "John Doe")
  string user_nickname = 12;  // User's preferred nickname (e.g., "Johnny")
}

message UserData {
  AccessTokenData access_token_data = 1;
  bool gemma_license_accepted = 2;
  int64 gemma_license_accepted_at_ms = 3;
  bool onboarding_completed = 4;
}

enum FillMode {
  FILL_MODE_UNSPECIFIED = 0;
  FILL_MODE_DISABLED = 1;
  FILL_MODE_SOLID = 2;
  FILL_MODE_COLORIZE = 3;
}

message Point {
  float x = 1;
  float y = 2;
}

message StrokePath {
  repeated Point point = 1;
  int32 brush_color = 2;
  float brush_size = 3;
  float brush_softness = 4;
  int32 blur_type = 5;
}

// A single cutout, used in scrapbook demo.
message Cutout {
  // id of the cutout.
  string id = 1;

  // Rotation degree applied to the cutout.
  int32 rotation_degree = 2;

  // The width of the border.
  int32 border_width = 3;

  // The color of the border.
  int32 border_color = 4;

  // The fill color.
  int32 fill_color = 5;

  // The fill mode.
  FillMode fill_mode = 6;

  // Doodle stroke paths.
  repeated StrokePath doodle_stroke = 7;
}

// A collection of cutout, used in scrapbook demo.
message CutoutCollection {
  repeated Cutout cutout = 1;
}
