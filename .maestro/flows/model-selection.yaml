appId: ai.ondevice.app
---
- launchApp:
    clearState: false

- assertVisible:
    text: ".*"
    timeout: 10000

- takeScreenshot: "model_list"

- tapOn:
    text: "Download"
    index: 0
    optional: true

- takeScreenshot: "after_download_tap"

# Wait for download dialog or progress
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000

- takeScreenshot: "download_state"
