  - test_case_id: "GQA-006-CD-002"
    category: "code_discussion"
    description: "Implementing a Repository pattern with Room and Retrofit"
    min_overall_score: 0.90
    original_context:
      messages:
        - role: "user"
          content: "Show me how to implement a Repository that uses both Room (local cache) and Retrofit (remote API)."
          is_starred: false
          is_system_generated: false
          is_first_in_conversation: true
        - role: "assistant"
          content: "Here's the complete pattern:\n\n```kotlin\n// Data source interfaces\ninterface UserRemoteDataSource {\n    suspend fun getUsers(): List<UserDto>\n}\n\ninterface UserLocalDataSource {\n    suspend fun getUsers(): List<UserEntity>\n    suspend fun insertUsers(users: List<UserEntity>)\n    suspend fun clearUsers()\n}\n\n// Repository\nclass UserRepository(\n    private val remoteDataSource: UserRemoteDataSource,\n    private val localDataSource: UserLocalDataSource,\n    private val mapper: UserMapper\n) {\n    suspend fun getUsers(forceRefresh: Boolean = false): Result<List<User>> {\n        return try {\n            // If force refresh or cache is empty, fetch from network\n            if (forceRefresh || localDataSource.getUsers().isEmpty()) {\n                val remoteUsers = remoteDataSource.getUsers()\n                val entities = remoteUsers.map { mapper.dtoToEntity(it) }\n                \n                localDataSource.clearUsers()\n                localDataSource.insertUsers(entities)\n            }\n            \n            // Always return from cache for single source of truth\n            val cachedUsers = localDataSource.getUsers().map { mapper.entityToDomain(it) }\n            Result.success(cachedUsers)\n        } catch (e: Exception) {\n            // On error, try to return cached data\n            val cachedUsers = localDataSource.getUsers()\n            if (cachedUsers.isNotEmpty()) {\n                Result.success(cachedUsers.map { mapper.entityToDomain(it) })\n            } else {\n                Result.failure(e)\n            }\n        }\n    }\n}\n```"
        - role: "user"
          content: "How do I implement the data sources?"
        - role: "assistant"
          content: "Here are the implementations:\n\n```kotlin\n// Remote data source (Retrofit)\nclass UserRemoteDataSourceImpl(private val api: UserApi) : UserRemoteDataSource {\n    override suspend fun getUsers(): List<UserDto> {\n        return api.getUsers()\n    }\n}\n\ninterface UserApi {\n    @GET(\"users\")\n    suspend fun getUsers(): List<UserDto>\n}\n\n// Local data source (Room)\nclass UserLocalDataSourceImpl(private val dao: UserDao) : UserLocalDataSource {\n    override suspend fun getUsers(): List<UserEntity> {\n        return dao.getAllUsers()\n    }\n    \n    override suspend fun insertUsers(users: List<UserEntity>) {\n        dao.insertUsers(users)\n    }\n    \n    override suspend fun clearUsers() {\n        dao.deleteAllUsers()\n    }\n}\n\n@Dao\ninterface UserDao {\n    @Query(\"SELECT * FROM users\")\n    suspend fun getAllUsers(): List<UserEntity>\n    \n    @Insert(onConflict = OnConflictStrategy.REPLACE)\n    suspend fun insertUsers(users: List<UserEntity>)\n    \n    @Query(\"DELETE FROM users\")\n    suspend fun deleteAllUsers()\n}\n\n@Entity(tableName = \"users\")\ndata class UserEntity(\n    @PrimaryKey val id: String,\n    val name: String,\n    val email: String\n)\n```"
    evaluation_queries:
      - query: "What's the single source of truth in this pattern?"
        min_acceptable_score: 0.90
        expected_keywords: ["cache", "local", "Room", "database"]
      - query: "What happens when the network call fails?"
        min_acceptable_score: 0.90
        expected_keywords: ["cached data", "fallback", "try-catch", "local"]

