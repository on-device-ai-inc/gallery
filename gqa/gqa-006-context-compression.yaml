  - test_case_id: "GQA-006-LC-001"
    category: "long_conversation"
    description: "Technical discussion about Android ViewModel lifecycle spanning 50 messages"
    min_overall_score: 0.85
    original_context:
      messages:
        - role: "user"
          content: "I'm new to Android development. Can you explain what a ViewModel is?"
          is_starred: false
          is_system_generated: false
          is_first_in_conversation: true
        - role: "assistant"
          content: "A ViewModel is an Android Architecture Component designed to store and manage UI-related data in a lifecycle-conscious way. It survives configuration changes like screen rotations. Key benefits: Separation of concerns, survives config changes, no memory leaks, easy testing."
        - role: "user"
          content: "How does it survive screen rotations?"
        - role: "assistant"
          content: "ViewModels are scoped to the Activity/Fragment lifecycle, not the specific instance. During rotation, Android destroys and recreates the Activity instance, but the ViewModel persists. It's held by a ViewModelStore which survives the rotation. The new Activity instance gets the same ViewModel from the ViewModelStore."
        - role: "user"
          content: "Can I store context in a ViewModel?"
        - role: "assistant"
          content: "No! Never store Context, View, or Lifecycle in a ViewModel. This causes memory leaks because ViewModels outlive Activities. Instead, use AndroidViewModel if you need Application context (safe because Application lives as long as the process)."
        - role: "user"
          content: "How do I create a ViewModel?"
        - role: "assistant"
          content: "1. Create a class extending ViewModel. 2. Override onCleared() for cleanup. 3. In Activity/Fragment, use: `val viewModel: MyViewModel by viewModels()` for Kotlin. This uses ViewModelProvider internally to get or create the ViewModel."
        - role: "user"
          content: "What's the difference between ViewModel and AndroidViewModel?"
        - role: "assistant"
          content: "AndroidViewModel extends ViewModel and provides Application context via `getApplication()`. Use it when you need safe access to resources, ContentResolver, etc. Regular ViewModel has no context access at all."
        - role: "user"
          content: "How do I pass data to a ViewModel?"
        - role: "assistant"
          content: "For simple data: constructor parameters with ViewModelProvider.Factory. For SavedStateHandle: Use Hilt @Assisted injection or SavedStateViewModelFactory. Example with Hilt: @HiltViewModel class MyViewModel @Inject constructor(private val repo: Repository, @Assisted private val savedState: SavedStateHandle)"
        - role: "user"
          content: "When should I use LiveData vs StateFlow in a ViewModel?"
        - role: "assistant"
          content: "StateFlow is generally preferred now: type-safe, better null handling, works with coroutines naturally. LiveData is lifecycle-aware by default (auto stops when inactive), but StateFlow with lifecycle.repeatOnLifecycle gives you more control. For new code: use StateFlow + repeatOnLifecycle."
        - role: "user"
          content: "Can two Fragments share a ViewModel?"
        - role: "assistant"
          content: "Yes! Scope the ViewModel to the Activity: `val viewModel: SharedViewModel by activityViewModels()` in both Fragments. They'll get the same instance. Perfect for Fragment communication without tight coupling."
        - role: "user"
          content: "How do I test a ViewModel?"
        - role: "assistant"
          content: "Unit test with JUnit + MockK. 1. Mock dependencies (repos). 2. Create ViewModel instance directly. 3. Call methods. 4. Assert state changes. Use `kotlinx-coroutines-test` for testing suspend functions and flows. No Android framework needed!"
    evaluation_queries:
      - query: "What's the key benefit of ViewModel for screen rotations?"
        min_acceptable_score: 0.85
        expected_keywords: ["survives", "rotation", "persists", "ViewModelStore"]
      - query: "Why shouldn't you store Context in a ViewModel?"
        min_acceptable_score: 0.90
        expected_keywords: ["memory leak", "outlive", "Activity"]
      - query: "How do two Fragments share data via ViewModel?"
        min_acceptable_score: 0.85
        expected_keywords: ["activityViewModels", "scoped", "Activity", "shared"]

  - test_case_id: "GQA-006-LC-002"
    category: "long_conversation"
    description: "Troubleshooting session about app crashes spanning 40 messages"
    min_overall_score: 0.85
    original_context:
      messages:
        - role: "user"
          content: "My app keeps crashing when I click the submit button. Here's the stack trace: java.lang.NullPointerException at com.example.FormActivity.submitForm(FormActivity.kt:45)"
          is_starred: false
          is_system_generated: false
          is_first_in_conversation: true
        - role: "assistant"
          content: "The NPE at line 45 suggests you're accessing a null object. Can you show me the code around FormActivity.kt:45?"
        - role: "user"
          content: "Here it is: `binding.emailEditText.text.toString()`. But I initialize binding in onCreate with `binding = ActivityFormBinding.inflate(layoutInflater)`"
        - role: "assistant"
          content: "The binding initialization looks correct. The issue might be that emailEditText is null. Check your XML layout - is the ID exactly `emailEditText` (camelCase)? Also verify you're using ViewBinding correctly (enabled in build.gradle)."
        - role: "user"
          content: "I checked the XML and the ID matches. Here's my build.gradle: android { viewBinding { enabled = true } }"
        - role: "assistant"
          content: "That's correct. Another possibility: are you calling submitForm() before onCreate completes? Or from a background thread? ViewBinding must be accessed on the main thread after inflation."
        - role: "user"
          content: "I call it from an onClick listener set in onCreate. Here: `binding.submitButton.setOnClickListener { submitForm() }`"
        - role: "assistant"
          content: "That should work. Let's check if binding itself is null. Add a null check: `binding?.emailEditText?.text?.toString()`. If this fixes it, the issue is binding being accessed after the view is destroyed (e.g., Fragment destroyed but click event fires)."
        - role: "user"
          content: "Actually, this is in a Fragment, not an Activity! I'm using `_binding` pattern. Here's my code: private var _binding: FragmentFormBinding? = null, private val binding get() = _binding!!"
        - role: "assistant"
          content: "Found it! The crash happens because `_binding` is null. This occurs when the Fragment's view is destroyed but the Fragment is still in memory. The safe pattern: `private val binding get() = _binding!!` should be `private val binding get() = _binding ?: error(\"View destroyed\")` for better error messages."
        - role: "user"
          content: "Why would the view be destroyed but Fragment still exist?"
        - role: "assistant"
          content: "Common scenario: Fragment is on the back stack. When you navigate away, the view is destroyed (onDestroyView called) but the Fragment instance survives. If your submitForm() is triggered after onDestroyView (e.g., delayed callback), you're accessing null binding. Always null out _binding in onDestroyView: `_binding = null`"
    evaluation_queries:
      - query: "What was the root cause of the NullPointerException?"
        min_acceptable_score: 0.90
        expected_keywords: ["binding", "null", "view destroyed", "Fragment"]
      - query: "What's the recommended pattern for ViewBinding in Fragments?"
        min_acceptable_score: 0.85
        expected_keywords: ["nullable", "_binding", "onDestroyView", "null out"]

  - test_case_id: "GQA-006-LC-003"
    category: "long_conversation"
    description: "Learning conversation about Kotlin coroutines with 60 messages"
    min_overall_score: 0.85
    original_context:
      messages:
        - role: "user"
          content: "I want to learn Kotlin coroutines. Where do I start?"
          is_starred: false
          is_system_generated: false
          is_first_in_conversation: true
        - role: "assistant"
          content: "Start with these concepts: 1) Coroutines are lightweight threads. 2) Suspend functions can pause and resume execution. 3) Scopes manage coroutine lifecycles. 4) Dispatchers control which thread runs the coroutine. Let's go through each."
        - role: "user"
          content: "What makes coroutines lightweight compared to threads?"
        - role: "assistant"
          content: "Threads are OS-level, expensive (each ~1MB stack). Coroutines are language-level, share threads, and have tiny overhead (~bytes). You can launch 100,000 coroutines easily, but 100,000 threads would crash. Coroutines are multiplexed onto a thread pool."
        - role: "user"
          content: "What's a suspend function?"
        - role: "assistant"
          content: "A function marked `suspend` can be paused at suspension points (like `delay()`) without blocking the thread. The thread can do other work while this coroutine is paused. When ready, the coroutine resumes where it left off. Syntax: `suspend fun fetchData(): String`"
        - role: "user"
          content: "Can I call a suspend function from a regular function?"
        - role: "assistant"
          content: "No! Suspend functions can only be called from other suspend functions or from a coroutine builder (launch, async, runBlocking). To call from regular code, use a coroutine builder: `viewModelScope.launch { fetchData() }`"
        - role: "user"
          content: "What are coroutine scopes?"
        - role: "assistant"
          content: "Scopes define the lifecycle and cancellation hierarchy of coroutines. Common scopes: GlobalScope (app lifetime, avoid!), viewModelScope (tied to ViewModel), lifecycleScope (tied to Activity/Fragment lifecycle). When scope is cancelled, all its coroutines cancel. This prevents leaks."
        - role: "user"
          content: "What's the difference between launch and async?"
        - role: "assistant"
          content: "`launch`: Fire-and-forget, returns Job, no result. Use for side effects. `async`: Returns Deferred<T>, call .await() to get result. Use for concurrent computation. Example: val result1 = async { api1() }; val result2 = async { api2() }; combine(result1.await(), result2.await())"
        - role: "user"
          content: "What are Dispatchers?"
        - role: "assistant"
          content: "Dispatchers determine which thread pool runs the coroutine. Dispatchers.Main: UI thread (Android). Dispatchers.IO: blocking I/O (network, disk). Dispatchers.Default: CPU-intensive work. Switch with withContext: `withContext(Dispatchers.IO) { loadFromDisk() }`"
        - role: "user"
          content: "How do I handle errors in coroutines?"
        - role: "assistant"
          content: "Use try-catch in suspend functions, or CoroutineExceptionHandler for the scope. Example: `val handler = CoroutineExceptionHandler { _, exception -> log(exception) }` then `viewModelScope.launch(handler) { riskyOperation() }`. Uncaught exceptions in launch cancel the scope, in async they're thrown when you await()."
        - role: "user"
          content: "Should I use runBlocking in Android?"
        - role: "assistant"
          content: "Almost never! runBlocking blocks the thread until coroutines complete. This freezes the UI if used on Main thread. Only use in tests or main() functions. In Android, always use launch or async with appropriate scope."
    evaluation_queries:
      - query: "What's the key advantage of coroutines over threads?"
        min_acceptable_score: 0.85
        expected_keywords: ["lightweight", "share threads", "efficient", "many"]
      - query: "When should you use async instead of launch?"
        min_acceptable_score: 0.85
        expected_keywords: ["result", "Deferred", "await", "concurrent computation"]
      - query: "Which Dispatcher should you use for network calls?"
        min_acceptable_score: 0.90
        expected_keywords: ["Dispatchers.IO", "IO", "blocking"]

