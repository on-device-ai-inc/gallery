  - test_case_id: "GQA-006-MT-001"
    category: "multi_topic"
    description: "Conversation covering ViewModels, Room, and Jetpack Compose"
    min_overall_score: 0.85
    original_context:
      messages:
        - role: "user"
          content: "I'm building an Android app with Jetpack Compose. Should I use ViewModel?"
          is_starred: false
          is_system_generated: false
          is_first_in_conversation: true
        - role: "assistant"
          content: "Yes! ViewModel is essential even with Compose. It manages UI state, survives configuration changes, and separates business logic from UI. Use `val viewModel: MyViewModel = viewModel()` or `hiltViewModel()` in your composable."
        - role: "user"
          content: "How do I expose state from ViewModel to Compose?"
        - role: "assistant"
          content: "Use StateFlow or State. Example: In ViewModel: `private val _uiState = MutableStateFlow(UiState())`; `val uiState = _uiState.asStateFlow()`. In Compose: `val uiState by viewModel.uiState.collectAsState()`. Now any change to uiState automatically recomposes your UI."
        - role: "user"
          content: "Now I need to persist this state. Should I use Room?"
        - role: "assistant"
          content: "Yes, Room is the recommended SQLite wrapper. Create an Entity, Dao, and Database. Example Entity: `@Entity data class Task(@PrimaryKey val id: Int, val title: String)`. Dao: `@Dao interface TaskDao { @Query(\"SELECT * FROM task\") fun getAll(): Flow<List<Task>> }`"
        - role: "user"
          content: "How do I integrate Room with my ViewModel?"
        - role: "assistant"
          content: "Inject a Repository that uses Room. In ViewModel: `class TaskViewModel(private val repo: TaskRepository) : ViewModel()`. Repository: `class TaskRepository(private val dao: TaskDao) { fun getTasks() = dao.getAll() }`. ViewModel exposes: `val tasks = repo.getTasks().stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), emptyList())`"
        - role: "user"
          content: "How do I display this Room data in Compose?"
        - role: "assistant"
          content: "Collect the flow as state: `val tasks by viewModel.tasks.collectAsState()`. Then use LazyColumn: `LazyColumn { items(tasks) { task -> TaskItem(task) } }`. The UI automatically updates when Room data changes because Flow emits new values."
        - role: "user"
          content: "What if I need to show a loading state while fetching data?"
        - role: "assistant"
          content: "Create a sealed UiState: `sealed class UiState { object Loading; data class Success(val tasks: List<Task>); data class Error(val message: String) }`. In ViewModel: emit Loading first, then Success/Error. In Compose: `when (uiState) { Loading -> CircularProgressIndicator(); is Success -> LazyColumn(...); is Error -> ErrorView(...) }`"
    evaluation_queries:
      - query: "How do you collect StateFlow in Jetpack Compose?"
        min_acceptable_score: 0.85
        expected_keywords: ["collectAsState", "by", "val"]
      - query: "What Room component emits updates to the UI?"
        min_acceptable_score: 0.85
        expected_keywords: ["Flow", "Dao", "query"]
      - query: "How do you represent loading state in UI?"
        min_acceptable_score: 0.85
        expected_keywords: ["sealed class", "UiState", "Loading", "Success", "Error"]

