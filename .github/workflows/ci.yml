name: Android CI

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

# Reusable snippet for generating google-services.json.
# Validates the secret JSON before use; falls back to placeholder if invalid.
env:
  GS_PLACEHOLDER: '{"project_info":{"project_number":"000000000000","project_id":"placeholder","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"ai.ondevice.app"}},"api_key":[{"current_key":"placeholder"}]}],"configuration_version":"1"}'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ] && printf '%s' "$GOOGLE_SERVICES_JSON" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "WARNING: GOOGLE_SERVICES_JSON missing or invalid JSON, using placeholder"
            printf '%s' "$GS_PLACEHOLDER" > app/google-services.json
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Run Android Lint
        run: ./gradlew lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: Android/src
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ] && printf '%s' "$GOOGLE_SERVICES_JSON" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "WARNING: GOOGLE_SERVICES_JSON missing or invalid JSON, using placeholder"
            printf '%s' "$GS_PLACEHOLDER" > app/google-services.json
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Run unit tests
        run: ./gradlew test

  build-debug:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: Android/src
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ] && printf '%s' "$GOOGLE_SERVICES_JSON" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "WARNING: GOOGLE_SERVICES_JSON missing or invalid JSON, using placeholder"
            printf '%s' "$GS_PLACEHOLDER" > app/google-services.json
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Create local.properties with API keys
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "hf.client.id=${{ secrets.HF_CLIENT_ID }}" >> local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: Android/src/app/build/outputs/apk/debug/app-debug.apk

  build-release:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: Android/src
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ] && printf '%s' "$GOOGLE_SERVICES_JSON" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "WARNING: GOOGLE_SERVICES_JSON missing or invalid JSON, using placeholder"
            printf '%s' "$GS_PLACEHOLDER" > app/google-services.json
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Create local.properties with API keys
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "hf.client.id=${{ secrets.HF_CLIENT_ID }}" >> local.properties

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ondevice-ai-release.keystore
          ls -la ondevice-ai-release.keystore

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Print release APK SHA-256
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            SHA256=$(sha256sum "$APK_PATH" | awk '{print $1}')
            SIZE_MB=$(du -m "$APK_PATH" | awk '{print $1}')
            echo "=== RELEASE APK ==="
            echo "SHA-256: $SHA256"
            echo "Size:    ${SIZE_MB}MB"
            echo "Date:    $(date -u +%Y-%m-%d)"
            echo "Update src/lib/apk-info.ts in gora-ai-web with these values."
            echo "=================="
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: Android/src/app/build/outputs/apk/release/app-release.apk

  instrumented-tests:
    runs-on: ubuntu-latest
    needs: build-debug
    if: contains(github.event.head_commit.message, '[run-e2e]')
    defaults:
      run:
        working-directory: Android/src
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          script: cd Android/src && ./gradlew connectedAndroidTest
