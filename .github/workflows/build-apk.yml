name: Build Android APK/AAB
on:
  push:
    branches: [ main, development ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create google-services.json
      run: printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    - name: Create local.properties with OAuth credentials
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "hf.client.id=${{ secrets.HF_CLIENT_ID }}" >> local.properties
        echo "hf.redirect.uri=ai.ondevice.app:/oauth2redirect" >> local.properties

    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > ondevice-ai-release.keystore
        ls -la ondevice-ai-release.keystore

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release AAB
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        ls -la ondevice-ai-release.keystore
        ./gradlew bundleRelease --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: Android/src/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release-aab
        path: Android/src/app/build/outputs/bundle/release/app-release.aab
        retention-days: 90
