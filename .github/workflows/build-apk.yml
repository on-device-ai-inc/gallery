name: Build Android APK/AAB
on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create google-services.json
      run: |
        PLACEHOLDER='{"project_info":{"project_number":"000000000000","project_id":"placeholder","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"ai.ondevice.app"}},"api_key":[{"current_key":"placeholder"}]}],"configuration_version":"1"}'
        if [ -n "$GOOGLE_SERVICES_JSON" ] && printf '%s' "$GOOGLE_SERVICES_JSON" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          echo "Using GOOGLE_SERVICES_JSON secret"
        else
          echo "WARNING: GOOGLE_SERVICES_JSON missing or invalid JSON, using placeholder"
          printf '%s' "$PLACEHOLDER" > app/google-services.json
        fi
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    - name: Create local.properties with OAuth credentials
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "hf.client.id=${{ secrets.HF_CLIENT_ID }}" >> local.properties
        echo "hf.redirect.uri=ai.ondevice.app:/oauth2redirect" >> local.properties

    - name: Decode keystore
      if: env.KEYSTORE_BASE64 != ''
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > ondevice-ai-release.keystore
        ls -la ondevice-ai-release.keystore

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release AAB
      if: env.KEYSTORE_BASE64 != '' && github.ref == 'refs/heads/main'
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      run: |
        ls -la ondevice-ai-release.keystore
        ./gradlew bundleRelease --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: Android/src/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release AAB
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-aab
        path: Android/src/app/build/outputs/bundle/release/app-release.aab
        retention-days: 90
